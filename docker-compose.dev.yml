services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: vocab
      POSTGRES_USER: vocab
      POSTGRES_PASSWORD: vocab
    ports:
      - "5432:5432"
    volumes:
      - vocab_dev_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vocab"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  vocab_dev_pgdata:
