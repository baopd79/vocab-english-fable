# HTTPS routing for the VPS (Task 21) — mounted over default.conf by
# docker-compose.tls.yml. Same routing as default.conf plus TLS termination.
# Certs are issued/renewed by certbot on the HOST (standalone + stop/start
# nginx hooks) and bind-mounted read-only into the container.

server {
    listen 80;
    server_name vocabun.com;

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    http2 on;
    server_name vocabun.com;

    ssl_certificate /etc/letsencrypt/live/vocabun.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/vocabun.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    # SPEC §13 — request bodies are tiny JSON; anything bigger is abuse.
    client_max_body_size 1m;

    # Docker's embedded DNS; variables force re-resolution so a redeployed
    # backend/frontend container doesn't leave nginx holding a dead IP.
    resolver 127.0.0.11 valid=10s;
    set $backend http://backend:8000;
    set $frontend http://frontend:3000;

    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    # Django's SECURE_PROXY_SSL_HEADER trusts this to know the real scheme.
    proxy_set_header X-Forwarded-Proto $scheme;

    location /api/ {
        proxy_pass $backend;
    }

    # Django admin + its static files (served by whitenoise from gunicorn).
    # SPEC §17.1-A3 (Q7): one extra credential layer before the Django login.
    # The htpasswd file exists only on the VPS (gitignored), mounted read-only
    # by docker-compose.tls.yml — create it BEFORE deploying this config.
    location /admin/ {
        auth_basic "Vocabun admin";
        auth_basic_user_file /etc/nginx/htpasswd;
        proxy_pass $backend;
    }

    location /static/ {
        proxy_pass $backend;
    }

    location / {
        proxy_pass $frontend;
    }
}
