# Single-domain routing (SPEC §13): /api + /admin + /static go to Django,
# everything else to Next.js. Same origin = refresh cookie works, no CORS.
# HTTPS (443 + certbot) is layered on in Task 21.

server {
    listen 80;
    server_name _;

    # SPEC §13 — request bodies are tiny JSON; anything bigger is abuse.
    client_max_body_size 1m;

    # Docker's embedded DNS. Using variables in proxy_pass forces nginx to
    # re-resolve service names instead of caching the container IP at startup;
    # without this, recreating backend/frontend leaves nginx pointing at a
    # dead IP (502) until it is restarted.
    resolver 127.0.0.11 valid=10s;
    set $backend http://backend:8000;
    set $frontend http://frontend:3000;

    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    # Django's SECURE_PROXY_SSL_HEADER trusts this to know the real scheme.
    proxy_set_header X-Forwarded-Proto $scheme;

    location /api/ {
        proxy_pass $backend;
    }

    # Django admin + its static files (served by whitenoise from gunicorn).
    location /admin/ {
        proxy_pass $backend;
    }

    location /static/ {
        proxy_pass $backend;
    }

    location / {
        proxy_pass $frontend;
    }
}
